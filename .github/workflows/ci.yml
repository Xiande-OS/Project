name: ltp-ci

# Quality-control CI: build the kernel for each platform and run the FULL LTP
# suite under QEMU, across the 4 cells RV/LA x musl/glibc. Test images are
# prebuilt full-suite sdcards downloaded from the 'test-images' release (CI does
# not build them — that hung on flaky mirrors). Downloaded images are cached so
# the download happens only when a cell's image (or IMG_VERSION) changes.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ltp-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Public Releases CDN on the mirror. Override with a repo variable of the same
  # name to point elsewhere.
  TEST_IMG_BASE: https://github.com/Xiande-OS/Project/releases/download/test-images
  # Bump when you re-upload images, to invalidate the per-cell image cache.
  IMG_VERSION: v1

jobs:
  ltp:
    name: ltp-${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: rv-musl,  arch: rv, libc: musl }
          - { name: rv-glibc, arch: rv, libc: glibc }
          - { name: la-musl,  arch: la, libc: musl }
          - { name: la-glibc, arch: la, libc: glibc }
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /

      - name: Install QEMU + cross linker
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-misc qemu-system-riscv64 \
            gcc-riscv64-linux-gnu gcc-14-loongarch64-linux-gnu curl
          qemu-system-riscv64 --version | head -1
          qemu-system-loongarch64 --version | head -1

      - name: Install Rust target
        run: rustup target add ${{ matrix.arch == 'rv' && 'riscv64gc-unknown-none-elf' || 'loongarch64-unknown-none' }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: cargo-${{ matrix.arch }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('kernel/src/**') }}
          restore-keys: |
            cargo-${{ matrix.arch }}-${{ hashFiles('Cargo.lock') }}-
            cargo-${{ matrix.arch }}-

      - name: Build kernel (${{ matrix.arch }})
        run: |
          make prepare
          TGT=${{ matrix.arch == 'rv' && 'riscv64gc-unknown-none-elf' || 'loongarch64-unknown-none' }}
          cargo build --release -p kernel --target "$TGT" --offline
          cp "target/$TGT/release/kernel" "kernel-${{ matrix.arch }}"
          ls -l "kernel-${{ matrix.arch }}"

      - name: Cache test image
        id: imgcache
        uses: actions/cache@v4
        with:
          path: ci/img/${{ matrix.name }}.img
          key: img-${{ matrix.name }}-${{ env.IMG_VERSION }}

      - name: Download test image (on cache miss)
        if: steps.imgcache.outputs.cache-hit != 'true'
        run: |
          chmod +x ci/*.sh
          bash ci/make-testimg.sh "${{ matrix.arch }}" "${{ matrix.libc }}" "ci/img/${{ matrix.name }}.img"

      - name: Run full LTP under QEMU
        run: |
          chmod +x ci/*.sh
          # Generous wall cap so the slow TCG guest reaches its in-kernel ltp
          # budget (~2000 guest-s) and emits END before the host wall fires.
          bash ci/run-qemu.sh "${{ matrix.arch }}" "ci/img/${{ matrix.name }}.img" "${{ matrix.name }}" 3600 \
            | tee "ci/${{ matrix.name }}.log"

      - name: Parse results + gate
        run: bash ci/parse-ltp.sh "${{ matrix.name }}" "ci/${{ matrix.name }}.log"

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ltp-log-${{ matrix.name }}
          path: ci/${{ matrix.name }}.log
          retention-days: 14

  # After all 4 cells, roll their logs up into a grade.txt-style score report:
  # total preview, per-cell totals, then every case with its per-cell TPASS.
  summary:
    name: score-summary
    needs: ltp
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all cell logs
        uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Aggregate scores (grade-style)
        run: python3 ci/summary.py dl
      - name: Upload score report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: score-report
          path: score-report.md
          retention-days: 14
