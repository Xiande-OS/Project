[alias]
xtask = "run --quiet --package xtask --"

# Per-target settings apply only when building for this triple,
# so host builds (xtask itself) are unaffected.
[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "link-arg=-Tkernel/linker.ld",
    "-C", "link-arg=-no-pie",
    "-C", "force-frame-pointers=yes",
]
